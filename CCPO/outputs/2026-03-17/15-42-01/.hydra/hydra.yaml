hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - algorithm.adv_estimator=grpo
    - algorithm.use_kl_in_reward=False
    - algorithm.kl_ctrl.kl_coef=0.001
    - algorithm.gamma=1.0
    - algorithm.lam=0.95
    - data.train_files=/gz-data/verl-main/data/MATH/train.parquet
    - data.val_files=/gz-data/verl-main/data/MATH/test500.parquet
    - data.return_raw_chat=True
    - data.train_batch_size=192
    - data.max_prompt_length=2048
    - data.max_response_length=8192
    - data.filter_overlong_prompts=True
    - data.filter_overlong_prompts_workers=64
    - data.truncation=error
    - trainer.use_legacy_worker_impl=disable
    - trainer.critic_warmup=0
    - trainer.logger=[console,wandb]
    - trainer.project_name=verl_grpo_math
    - trainer.experiment_name=qwen3-4b-base-math500-gspo-fsdp
    - trainer.default_local_dir=/gz-data/verl-gspo-VD-double/checkpoint/verl_grpo_math/qwen3-4b-base-math500-gspo-fsdp
    - trainer.n_gpus_per_node=6
    - trainer.nnodes=1
    - trainer.val_before_train=False
    - trainer.log_val_generations=100
    - trainer.save_freq=-1
    - trainer.test_freq=10
    - trainer.total_epochs=10
    - trainer.total_training_steps=500
    - actor_rollout_ref.actor.optim.lr=1e-6
    - actor_rollout_ref.model.path=/gz-data/models/Qwen3-4B-Base
    - actor_rollout_ref.model.use_remove_padding=True
    - actor_rollout_ref.model.enable_gradient_checkpointing=True
    - actor_rollout_ref.actor.use_kl_loss=False
    - actor_rollout_ref.actor.kl_loss_coef=0.001
    - actor_rollout_ref.actor.clip_ratio_low=3e-4
    - actor_rollout_ref.actor.clip_ratio_high=4e-4
    - actor_rollout_ref.actor.clip_ratio_c=10.0
    - actor_rollout_ref.actor.policy_loss.loss_mode=gspo
    - actor_rollout_ref.actor.use_dynamic_bsz=True
    - actor_rollout_ref.actor.ppo_mini_batch_size=24
    - actor_rollout_ref.actor.ppo_max_token_len_per_gpu=30720
    - actor_rollout_ref.actor.fsdp_config.strategy=fsdp
    - actor_rollout_ref.actor.fsdp_config.param_offload=True
    - actor_rollout_ref.actor.fsdp_config.optimizer_offload=True
    - actor_rollout_ref.actor.ulysses_sequence_parallel_size=1
    - actor_rollout_ref.rollout.name=vllm
    - actor_rollout_ref.rollout.mode=async
    - actor_rollout_ref.rollout.tensor_model_parallel_size=2
    - actor_rollout_ref.rollout.data_parallel_size=1
    - actor_rollout_ref.rollout.expert_parallel_size=1
    - actor_rollout_ref.rollout.log_prob_use_dynamic_bsz=True
    - actor_rollout_ref.rollout.log_prob_max_token_len_per_gpu=30720
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.8
    - actor_rollout_ref.rollout.n=16
    - actor_rollout_ref.rollout.val_kwargs.top_p=0.7
    - actor_rollout_ref.rollout.val_kwargs.temperature=1.0
    - actor_rollout_ref.rollout.val_kwargs.n=1
    - actor_rollout_ref.ref.log_prob_use_dynamic_bsz=True
    - actor_rollout_ref.ref.log_prob_max_token_len_per_gpu=30720
    - reward.reward_manager.name=dapo
    - +reward.reward_kwargs.overlong_buffer_cfg.enable=True
    - +reward.reward_kwargs.overlong_buffer_cfg.len=4096
    - +reward.reward_kwargs.overlong_buffer_cfg.penalty_factor=1.0
    - +reward.reward_kwargs.overlong_buffer_cfg.log=False
    - +reward.reward_kwargs.max_resp_len=8192
  job:
    name: main_ppo
    chdir: null
    override_dirname: +reward.reward_kwargs.max_resp_len=8192,+reward.reward_kwargs.overlong_buffer_cfg.enable=True,+reward.reward_kwargs.overlong_buffer_cfg.len=4096,+reward.reward_kwargs.overlong_buffer_cfg.log=False,+reward.reward_kwargs.overlong_buffer_cfg.penalty_factor=1.0,actor_rollout_ref.actor.clip_ratio_c=10.0,actor_rollout_ref.actor.clip_ratio_high=4e-4,actor_rollout_ref.actor.clip_ratio_low=3e-4,actor_rollout_ref.actor.fsdp_config.optimizer_offload=True,actor_rollout_ref.actor.fsdp_config.param_offload=True,actor_rollout_ref.actor.fsdp_config.strategy=fsdp,actor_rollout_ref.actor.kl_loss_coef=0.001,actor_rollout_ref.actor.optim.lr=1e-6,actor_rollout_ref.actor.policy_loss.loss_mode=gspo,actor_rollout_ref.actor.ppo_max_token_len_per_gpu=30720,actor_rollout_ref.actor.ppo_mini_batch_size=24,actor_rollout_ref.actor.ulysses_sequence_parallel_size=1,actor_rollout_ref.actor.use_dynamic_bsz=True,actor_rollout_ref.actor.use_kl_loss=False,actor_rollout_ref.model.enable_gradient_checkpointing=True,actor_rollout_ref.model.path=/gz-data/models/Qwen3-4B-Base,actor_rollout_ref.model.use_remove_padding=True,actor_rollout_ref.ref.log_prob_max_token_len_per_gpu=30720,actor_rollout_ref.ref.log_prob_use_dynamic_bsz=True,actor_rollout_ref.rollout.data_parallel_size=1,actor_rollout_ref.rollout.expert_parallel_size=1,actor_rollout_ref.rollout.gpu_memory_utilization=0.8,actor_rollout_ref.rollout.log_prob_max_token_len_per_gpu=30720,actor_rollout_ref.rollout.log_prob_use_dynamic_bsz=True,actor_rollout_ref.rollout.mode=async,actor_rollout_ref.rollout.n=16,actor_rollout_ref.rollout.name=vllm,actor_rollout_ref.rollout.tensor_model_parallel_size=2,actor_rollout_ref.rollout.val_kwargs.n=1,actor_rollout_ref.rollout.val_kwargs.temperature=1.0,actor_rollout_ref.rollout.val_kwargs.top_p=0.7,algorithm.adv_estimator=grpo,algorithm.gamma=1.0,algorithm.kl_ctrl.kl_coef=0.001,algorithm.lam=0.95,algorithm.use_kl_in_reward=False,data.filter_overlong_prompts=True,data.filter_overlong_prompts_workers=64,data.max_prompt_length=2048,data.max_response_length=8192,data.return_raw_chat=True,data.train_batch_size=192,data.train_files=/gz-data/verl-main/data/MATH/train.parquet,data.truncation=error,data.val_files=/gz-data/verl-main/data/MATH/test500.parquet,reward.reward_manager.name=dapo,trainer.critic_warmup=0,trainer.default_local_dir=/gz-data/verl-gspo-VD-double/checkpoint/verl_grpo_math/qwen3-4b-base-math500-gspo-fsdp,trainer.experiment_name=qwen3-4b-base-math500-gspo-fsdp,trainer.log_val_generations=100,trainer.logger=[console,wandb],trainer.n_gpus_per_node=6,trainer.nnodes=1,trainer.project_name=verl_grpo_math,trainer.save_freq=-1,trainer.test_freq=10,trainer.total_epochs=10,trainer.total_training_steps=500,trainer.use_legacy_worker_impl=disable,trainer.val_before_train=False
    id: ???
    num: ???
    config_name: ppo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /gz-data/verl-gspo-VD-double
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /gz-data/verl-gspo-VD-double/verl/trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /gz-data/verl-gspo-VD-double/outputs/2026-03-17/15-42-01
    choices:
      algorithm@algorithm.rollout_correction: rollout_correction
      reward: reward
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      data: legacy_data
      model_engine: dp
      critic: dp_critic
      critic/../engine@critic.model.fsdp_config: fsdp
      critic/../optim@critic.optim: fsdp
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
