hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - trainer.project_name=rema_sep_baseline
    - trainer.experiment_name=llama3.1-8b-math500-method3_1_3-eval
    - trainer.nnodes=1
    - trainer.n_gpus_per_node=4
    - data.train_files=data/MATH/train.parquet
    - data.val_files=data/Gaokao2023-Math-En_with_prompt.parquet
    - data.val_batch_size=64
    - data.train_batch_size=64
    - data.max_prompt_length=4096
    - data.max_response_length=2048
    - algorithm.switch_agent.enable=True
    - algorithm.switch_agent.freq=10
    - algorithm.switch_agent.model_paths=[/gz-data/models/Meta-Llama-3.1-8B-Instruct,/gz-data/models/Meta-Llama-3.1-8B-Instruct]
    - actor_rollout_ref.model.path=/gz-data/models/Meta-Llama-3.1-8B-Instruct
    - actor_rollout_ref.model.use_remove_padding=True
    - actor_rollout_ref.actor.use_dynamic_bsz=True
    - actor_rollout_ref.actor.use_kl_loss=False
    - actor_rollout_ref.actor.kl_loss_coef=1e-3
    - actor_rollout_ref.actor.entropy_coeff=0
    - actor_rollout_ref.actor.ulysses_sequence_parallel_size=1
    - actor_rollout_ref.actor.ppo_mini_batch_size=64
    - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=2
    - actor_rollout_ref.actor.clip_mode=turn
    - actor_rollout_ref.actor.agg_mode=trajectory
    - actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=16
    - actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=16
    - actor_rollout_ref.rollout.tensor_model_parallel_size=1
    - actor_rollout_ref.rollout.max_num_batched_tokens=8192
    - actor_rollout_ref.rollout.max_num_turns=1
    - actor_rollout_ref.rollout.n=4
    - actor_rollout_ref.rollout.stop_when_truncated=True
    - actor_rollout_ref.actor.optim.lr=1e-6
    - +trainer.val_before_train=True
    - +trainer.val_only=True
    - +trainer.save_val_generations=True
    - +trainer.save_train_generations=False
    - trainer.test_freq=10
    - trainer.save_freq=500
    - trainer.remove_previous_ckpt_in_save=True
    - trainer.total_epochs=10
    - algorithm.adv_estimator=grpo
    - reward_model.reward_manager=rema
    - reward_model.mask_unfinished_reward=True
    - algorithm.filter_groups.enable=False
    - trainer.logger=[console,wandb]
    - trainer.resume_mode=checkpoints/ccpo_leave_one_out/llama3_1_8b-ins-LeaveOneOutRwd-math500-gpuGeek1-method3_1_3_savecheckpoints/global_step_80
    - trainer.resume_from_path=True
  job:
    name: main_ppo
    chdir: null
    override_dirname: +trainer.save_train_generations=False,+trainer.save_val_generations=True,+trainer.val_before_train=True,+trainer.val_only=True,actor_rollout_ref.actor.agg_mode=trajectory,actor_rollout_ref.actor.clip_mode=turn,actor_rollout_ref.actor.entropy_coeff=0,actor_rollout_ref.actor.kl_loss_coef=1e-3,actor_rollout_ref.actor.optim.lr=1e-6,actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=2,actor_rollout_ref.actor.ppo_mini_batch_size=64,actor_rollout_ref.actor.ulysses_sequence_parallel_size=1,actor_rollout_ref.actor.use_dynamic_bsz=True,actor_rollout_ref.actor.use_kl_loss=False,actor_rollout_ref.model.path=/gz-data/models/Meta-Llama-3.1-8B-Instruct,actor_rollout_ref.model.use_remove_padding=True,actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=16,actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=16,actor_rollout_ref.rollout.max_num_batched_tokens=8192,actor_rollout_ref.rollout.max_num_turns=1,actor_rollout_ref.rollout.n=4,actor_rollout_ref.rollout.stop_when_truncated=True,actor_rollout_ref.rollout.tensor_model_parallel_size=1,algorithm.adv_estimator=grpo,algorithm.filter_groups.enable=False,algorithm.switch_agent.enable=True,algorithm.switch_agent.freq=10,algorithm.switch_agent.model_paths=[/gz-data/models/Meta-Llama-3.1-8B-Instruct,/gz-data/models/Meta-Llama-3.1-8B-Instruct],data.max_prompt_length=4096,data.max_response_length=2048,data.train_batch_size=64,data.train_files=data/MATH/train.parquet,data.val_batch_size=64,data.val_files=data/Gaokao2023-Math-En_with_prompt.parquet,reward_model.mask_unfinished_reward=True,reward_model.reward_manager=rema,trainer.experiment_name=llama3.1-8b-math500-method3_1_3-eval,trainer.logger=[console,wandb],trainer.n_gpus_per_node=4,trainer.nnodes=1,trainer.project_name=rema_sep_baseline,trainer.remove_previous_ckpt_in_save=True,trainer.resume_from_path=True,trainer.resume_mode=checkpoints/ccpo_leave_one_out/llama3_1_8b-ins-LeaveOneOutRwd-math500-gpuGeek1-method3_1_3_savecheckpoints/global_step_80,trainer.save_freq=500,trainer.test_freq=10,trainer.total_epochs=10
    id: ???
    num: ???
    config_name: ppo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /gz-data/leaveOneOutRwdC_method3_1_3
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /gz-data/leaveOneOutRwdC_method3_1_3/src/verl/verl/rema_separated_trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /gz-data/leaveOneOutRwdC_method3_1_3/outputs/2026-01-12/11-27-35
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
